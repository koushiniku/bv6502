# bv6502.cfg

SYMBOLS {
    __STACKSIZE__:value = $0100, type = weak;
}
MEMORY {
    ZP: file = %O, start = $0, size = $100, fill = yes, define = yes;
    CPUSTACK: file = %O, start = $100, size = $100, fill = yes, define = yes;
    RAM:    file = %O, start = $200, size = $7E00 - __STACKSIZE__,
            fill = yes, define = yes;
    CSTACK: file = %O, start = $8000 - __STACKSIZE__, 
            size = __STACKSIZE__, fill = yes, define = yes;
    BRAM: file = %O, start = $8000, size = $4000, fill = yes, define = yes;
    IO: file = %O, start = $C000, size = $100, fill = yes, define = yes;
    HIRAM: file = %O, start = $C100, size = $3F00, fill = yes, define yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP, type = zp, define = yes;
    DATA: load = HIRAM, type = rw, define = yes, align = $100;
    BSS: load = HIRAM, type = bss, define = yes, align = $100;
    RODATA: load = HIRAM, type = ro, define = yes;
    CODE: load = HIRAM, type = rw, define = yes;
    ONCE: load = HIRAM, type = rw, define = yes;
    VECTORS: load = HIRAM, type = ro, start = $FFFA, define = yes;
}
FEATURES {
    CONDES: segment = RODATA,
            type = constructor,
            label = __CONSTRUCTOR_TABLE__,
            count = __CONSTRUCTOR_COUNT__;
    CONDES: segment = RODATA,
            type = destructor,
            label = __DESTRUCTOR_TABLE__,
            count = __DESTRUCTOR_COUNT__;
    CONDES: segment = RODATA,
            type = interruptor,
            label = __INTERRUPTOR_TABLE__,
            count = __INTERRUPTOR_COUNT__;
}
FILES {
    %O: format = bin;
}
