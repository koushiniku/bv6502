# bv6502.cfg

SYMBOLS {
    __STACKSIZE__:  value = $0200, type = weak;
}
MEMORY {
    IO:       file = "", start = $0000, size = $0014;
    ZP:       file = "", start = $0014, size = $00ec;
    CPUSTACK: file = "", start = $0100, size = $0100;
    RAM:      file = "", start = $0200, size = $7E00 - __STACKSIZE__,            define = yes;
    ROM:      file = %O, start = $8000, size = $8000, fill = yes, fillval = $00, define = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP,             type = zp;
    DATA:     load = ROM, run = RAM, type = rw;
    BSS:      load = RAM,            type = bss, define = yes;
    A256:     load = RAM,            type = bss, define = yes, align = $100;
    RO256:    load = ROM,            type = bss,               align = $100;
    RO32:     load = ROM,            type = bss,               align = $20;
    RODATA:   load = ROM,            type = ro;
    CODE:     load = ROM,            type = ro;
    VECTORS:  load = ROM,            type = ro, start = $FFFA;
}
FEATURES {
    CONDES:   segment = ONCE,
              type    = constructor,
              label   = __CONSTRUCTOR_TABLE__,
              count   = __CONSTRUCTOR_COUNT__;
    CONDES:   segment = RODATA,
              type    = destructor,
              label   = __DESTRUCTOR_TABLE__,
              count   = __DESTRUCTOR_COUNT__;
    CONDES:   segment = RODATA,
              type    = interruptor,
              label   = __INTERRUPTOR_TABLE__,
              count   = __INTERRUPTOR_COUNT__;
}
FILES {
    %O:       format = bin;
}
