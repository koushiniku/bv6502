# bv6502.cfg

SYMBOLS {
    __STACKSIZE__:  value = $0800, type = weak;
}
MEMORY {
    ZP:       file = "", start = $0000, size = $0100;
    CPUSTACK: file = "", start = $0100, size = $0100;
    RAM:      file = "", start = $0200, size = $7D80 - __STACKSIZE__,            define = yes;
    IO:       file = "", start = $7F80, size = $0080;
    RSVD:     file = "", start = $8000, size = $4000;
    ROM:      file = %O, start = $C000, size = $4000, fill = yes, fillval = $00, define = yes;
}
SEGMENTS {
    ZEROPAGE: load = ZP,             type = zp,  define   = yes;
    DATA:     load = ROM, run = RAM, type = rw,  define   = yes;
    BSS:      load = RAM,            type = bss, define   = yes;
    ONCE:     load = ROM,            type = ro,  optional = yes;
    RODATA:   load = ROM,            type = ro,  define   = yes;
    CODE:     load = ROM,            type = ro,  define   = yes;
    VECTORS:  load = ROM,            type = ro,  start    = $FFFA;
}
FEATURES {
    CONDES:   segment = ONCE,
              type    = constructor,
              label   = __CONSTRUCTOR_TABLE__,
              count   = __CONSTRUCTOR_COUNT__;
    CONDES:   segment = RODATA,
              type    = destructor,
              label   = __DESTRUCTOR_TABLE__,
              count   = __DESTRUCTOR_COUNT__;
    CONDES:   segment = RODATA,
              type    = interruptor,
              label   = __INTERRUPTOR_TABLE__,
              count   = __INTERRUPTOR_COUNT__;
}
FILES {
    %O:       format = bin;
}
